<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro · 100 Palabras</title>
  <meta name="description" content="Concurso literario de microrrelatos de 100 palabras." />

  <!-- Open Graph (para compartir en redes) -->
  <meta property="og:title" content="Intro · 100 Palabras" />
  <meta property="og:description" content="Concurso literario de microrrelatos de 100 palabras." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <!-- Resaltado de sintaxis (highlight.js, tema oscuro) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- ===== Barra de navegación ===== -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a class="brand" href="#">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M6 5l6 7-6 7M13 5l6 7-6 7" stroke="white" stroke-width="2.4"
                  stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span class="brand-text">Intro<span class="brand-accent">100</span>Palabras</span>
      </a>
    </div>
  </nav>

  <!-- ===== Hero ===== -->
  <header class="hero">
    <span class="dots dots--tl" aria-hidden="true"></span>
    <span class="dots dots--br" aria-hidden="true"></span>
    <div class="container hero-inner">
      <p class="eyebrow">Concurso literario</p>
      <h1 class="hero-title">
        Distintas voces,<br /><span class="accent">una sola página</span>
      </h1>
      <p class="hero-tagline">
        Una selección de las entradas del concurso, cada una con su propia voz,
        formato y estilo.
      </p>
      <a class="btn" href="#entradas">Leer las entradas</a>
    </div>
  </header>

  <!-- ===== Entradas ===== -->
  <main class="container">
    <section id="entradas" aria-labelledby="entradas-title">
      <div class="section-head">
        <h2 id="entradas-title">Entradas</h2>
        <p class="count" id="entry-count" aria-live="polite"></p>
      </div>

      <div id="entries" class="entries-grid">
        <!-- Las entradas se renderizan aquí desde assets/js/main.js -->
      </div>

      <p id="empty-state" class="empty-state" hidden>
        Todavía no hay entradas publicadas. ¡Vuelve pronto!
      </p>
    </section>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>Intro · 100 Palabras — Concurso de microrrelatos.</p>
    </div>
  </footer>

  <!-- Resaltado de sintaxis: debe cargar antes de main.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Datos primero, luego la lógica que los usa -->
  <script src="data/entradas.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
