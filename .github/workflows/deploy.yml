name: Deploy a GitHub Pages

# Publica el sitio cada vez que haces push a la rama principal.
on:
  push:
    branches: ["main"]
  workflow_dispatch: # Permite lanzarlo manualmente desde la pestaña "Actions".

# Permisos que necesita GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (todo el sitio)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
